<!DOCTYPE html>
<html>
<head>
    <title>Product List</title>
</head>
<body>

<h1>Product List</h1>

<table border="1">
    <tr>
        <th>Code</th>
        <th>Name</th>
        <th>Quantity</th>
        <th>Selling Price</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product.product_code }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.quantity }}</td>
        <td>{{ product.selling_price }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
